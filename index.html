<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuenta atrás para nuestro reencuentro</title>
    <meta name="description" content="Landing page emocional y elegante para contar el tiempo que falta para volver a ver a alguien especial." />
    <meta name="theme-color" content="#1f1636" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cuenta atrás para nuestro reencuentro" />
    <meta property="og:description" content="Una cuenta atrás bonita, responsive y fácil de personalizar para un reencuentro especial." />
    <meta property="og:image" content="assets/img/og-preview.svg" />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="background-layer" aria-hidden="true"></div>
    <header class="wrapper topbar">
      <a id="brand-link" class="brand" href="#" aria-label="Inicio">
        <img id="brand-logo" src="" alt="Logo" hidden />
        <span id="brand-name">Nuestro reencuentro</span>
      </a>
      <button id="theme-toggle" class="btn btn-ghost" type="button" aria-label="Cambiar tema">
        <span aria-hidden="true">🌙</span>
        <span id="theme-toggle-text">Tema</span>
      </button>
    </header>
    <main class="wrapper">
      <section class="hero" aria-labelledby="main-title">
        <p id="hero-tag" class="hero-tag" hidden></p>
        <h1 id="main-title">Cargando contador...</h1>
        <p id="subtitle" class="subtitle"></p>
        <p id="dedication" class="dedication"></p>
        <div class="countdown" aria-live="polite" aria-atomic="true">
          <article class="time-card"><p id="days" class="time-value">00</p><p id="label-days" class="time-label">Días</p></article>
          <article class="time-card"><p id="hours" class="time-value">00</p><p id="label-hours" class="time-label">Horas</p></article>
          <article class="time-card"><p id="minutes" class="time-value">00</p><p id="label-minutes" class="time-label">Minutos</p></article>
          <article class="time-card"><p id="seconds" class="time-value">00</p><p id="label-seconds" class="time-label">Segundos</p></article>
        </div>
        <p id="status-message" class="status-message" role="status"></p>
        <div class="actions">
          <button id="share-btn" class="btn btn-primary" type="button">Compartir</button>
          <button id="calendar-btn" class="btn btn-secondary" type="button" hidden>Recordar esta fecha</button>
        </div>
        <nav id="social-links" class="social-links" aria-label="Redes sociales"></nav>
      </section>
      <section id="event-details" class="event-details" hidden aria-labelledby="event-details-title">
        <h2 id="event-details-title">Detalles del reencuentro</h2>
        <p id="event-name" class="event-name"></p>
        <p id="event-location" class="event-location"></p>
        <p id="event-description" class="event-description"></p>
        <p id="event-special-message" class="event-special-message"></p>
      </section>
    </main>
    <footer class="wrapper footer"><p id="footer-note">Hecho para contar los días con ilusión ✨</p></footer>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
